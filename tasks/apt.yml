---
- name: Update APT package cache
  ansible.builtin.apt:
    update_cache: true
  changed_when: false
  retries: 5
  delay: 10
  register: result
  until: result is success
  tags:
    - molecule-idempotence-notest

- name: Install system packages
  ansible.builtin.apt:
    name:
      - sudo
      - build-essential
      - supervisor
      - openssl
      - libssl-dev
      - libffi-dev
      - python3
      - virtualenv
      - cron
      - curl
      # needed to generate SSH key for push updates
      - openssh-client
      - logrotate
      # required for celerybeat
      - python3-gdbm
  ignore_errors: true
  retries: 5
  delay: 10
  register: result
  until: result is success

- name: Install nginx
  ansible.builtin.apt:
    name: nginx
  when: openwisp2_nginx_install

- name: Check if nginx gzip_static module is available
  shell: "nginx -V 2>&1 | grep -q 'http_gzip_static_module' && echo 'available' || echo 'not_available'"
  register: gzip_static_check
  when: openwisp2_nginx_install
  changed_when: false

- name: Check if nginx brotli module is available
  shell: "nginx -V 2>&1 | grep -q 'brotli' && echo 'available' || echo 'not_available'"
  register: brotli_check
  when: openwisp2_nginx_install
  changed_when: false

- name: Set nginx module availability facts
  set_fact:
    nginx_gzip_static_available: >-
      {{ (gzip_static_check.stdout | default('not_available')) == 'available' and
         (openwisp2_nginx_gzip_static == true or openwisp2_nginx_gzip_static == 'auto') }}
    nginx_brotli_static_available: >-
      {{ (brotli_check.stdout | default('not_available')) == 'available' and
         (openwisp2_nginx_brotli_static == true or openwisp2_nginx_brotli_static == 'auto') }}
  when: openwisp2_nginx_install

- name: Set nginx module availability facts (nginx not installed)
  set_fact:
    nginx_gzip_static_available: false
    nginx_brotli_static_available: false
  when: not openwisp2_nginx_install

- name: Install redis
  ansible.builtin.apt:
    name: redis-server
  notify:
    - Start redis
  when: openwisp2_redis_install

# On the newer versions of redis, by default redis
# binds to localhost on ipv6 address which wouldn't
# let the service start if the server doesn't have
# ipv6 enabled. Hence, we set redis to listen on ipv4
- name: Set redis to listen on ipv4
  notify: Start redis
  when: openwisp2_redis_install
  ansible.builtin.lineinfile:
    path: /etc/redis/redis.conf
    regexp: "^bind 127\\.0\\.0\\.1 ::1"
    line: "bind 127.0.0.1"
    backrefs: true
  failed_when: false

- name: Start redis
  when: openwisp2_redis_install
  ansible.builtin.service:
    name: redis
    state: started

- name: Install geographic libraries
  ansible.builtin.apt:
    name:
      - gdal-bin
      - libproj-dev
      - libgeos-dev
  retries: 5
  delay: 10
  register: result
  until: result is success

- name: Install spatialite
  when: '"spatialite" in openwisp2_database.engine'
  ansible.builtin.apt:
    name:
      - sqlite3
      - libspatialite-dev
  retries: 5
  delay: 10
  register: result
  until: result is success

- name: Install postgresql client drivers
  when: openwisp2_database.engine == "django.contrib.gis.db.backends.postgis"
  ansible.builtin.apt:
    name: libpq-dev
  retries: 5
  delay: 10
  register: result
  until: result is success

- name: Install cairo
  when: openwisp2_radius
  ansible.builtin.apt:
    name:
      - libcairo2
      - libpango-1.0-0
      - libpangocairo-1.0-0
      - "{{ openwisp2_libgdk_pixbuf_pkg }}"
      - shared-mime-info
  tags: [openwisp2, radius]

- name: Install mod-spatialite (may fail on older linux distros)
  when: '"spatialite" in openwisp2_database.engine'
  ansible.builtin.apt:
    name: libsqlite3-mod-spatialite
  ignore_errors: true
  retries: 5
  delay: 10
  register: result
  until: result is success

# fixes issue described in https://docs.ansible.com/ansible/become.html#becoming-an-unprivileged-user
- name: Install acl if acting as non-root user
  ansible.builtin.apt:
    name: acl
  when: ansible_user is not defined or ansible_user != 'root'
  retries: 5
  delay: 10
  register: result
  until: result is success
  ignore_errors: true

- name: Ensure supervisor is started
  ansible.builtin.service:
    name: supervisor
    state: started

- name: Install python3 packages
  ansible.builtin.apt:
    name:
      - python3-pip
      - python3-dev
      - python3-virtualenv
  retries: 5
  delay: 10
  register: result
  until: result is success

- name: Install ntp
  when: openwisp2_install_ntp
  ansible.builtin.apt:
    name: "{{ openwisp2_ntp_pkg }}"
  retries: 5
  delay: 10
  register: result
  until: result is success

- name: Install gettext
  ansible.builtin.apt:
    name: gettext
  when: openwisp2_internationalization
  retries: 5
  delay: 10
  register: result
  until: result is success

- name: Install fping
  when: openwisp2_monitoring
  ansible.builtin.apt:
    name:
      - fping
  retries: 5
  delay: 10
  register: result
  until: result is success
